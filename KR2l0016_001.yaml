  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2l0016_WYG_001-1a, image: WYG0602/WYG0602-0621c.png}
body:
  text: 州縣提綱卷一潔己居官不言亷亷蓋居官者分內事孰不知亷可以服人然中無所主則見利易動其天資黷貨竊取於公受賂於民略亡忌憚者固不足論若夫稍知忌憚者則曰吾不竊取於公受賂於民足矣吏呈辭訟度有所取則曲從書判未幾責置縑帛虛立領直十不償一私家飲食備於市買縱其強掠於市不酬其錢役工匠造器用則不給衣食勒吏輪具以至燈燭樵薪責之吏典似此者不一而足雖欲避竊取受賂之名不知吏之所得非官司欺弊則掊民膏脂吾取於此與竊取受賂何異盍思人生貧富固有定分越分過取此有所得彼必有虧况明有三尺一陷貪墨終身不可洗濯故可飢可寒可殺可戮獨不可一毫妄取茍有一毫妄取雖有竒才異能終不能以善其後故為官者當以亷為先而能亷者必深知分定之説平心事惟公平可以服人心或者畏首畏尾欲為自全之計每憚豪強之劫持至於曲法徇情使小民有寃而亡告有欲矯是弊者又一切以抑強扶弱為主而不問乎理之曲直不知富室之賢而安分者固多貧民亦有無顧藉而為惡者在我不先平其心而有意於抑強扶弱則富者憎而不知其善貧者愛而不知其惡其弊必至於佃者得以抗主無藉之人得以陵辱衣冠甚而姦猾之徒有故為襤縷之狀以欺有司者要之天下之事惟其是而已詎可必於抑強亦豈可必於治弱惟平心定氣因是非而論曲直則事不失之偏而人心得其平矣專勤今日自一命以上孰不知作邑之難既知其難要當專心致志朝夕以思自邑事外一毫不可經意如聲色飲燕不急之務冝一切屏去蓋人之精力有限溺於聲色燕飲則精力必減意氣必昏肢體必倦雖欲勤於政而力不逮故事必廢弛而吏得以乘間為欺昔劉元明政為天下第一問其故則不過曰日食一升飯不飲酒為作縣第一䇿誠哉是言奉職循理為政先教化而後刑責寬猛適中循循不迫俾民得以安居樂業則歷久而亡弊若矜用才智以興立為事專尚威猛以擊搏其民而求一時赫赫之名其初固亦駭人觀聼然多不能以善後歷觀古今其才能足以蓋衆者固多矣然利未及民而所傷者已多故史傳獨有取於循吏者無他索隱所謂奉職循理為政之先案此文乃司馬貞史記索隱述贊中語是也節用飬亷仕宦有俸給之薄者所得不償所用資産優厚猶有可諉若資産微薄悉藉俸給而乃用度不節日用飲食衣服奴婢之奉便欲一一如意重之以嫁娶之交迫必至窘乏夫平昔奢侈之人一旦窘乏必不能堪窺竊之心繇是而起猾吏彌縫其意又從而餌之一旦事露失位辱身追悔莫及故欲飬亷莫若量其所入節其所用雖粗衣糲食節淡度日然俯仰亡愧居之而安履之而順其心休休豈不樂哉勿求虗譽有實必有名虗譽暴集則毁言隨至矣居官有欲沽虗譽而覬美職者民本安靜必欲興事改作以祈上官之知姦􅠕當治必欲曲法庇護以悅小人之意以至修飾厨傳厚賂過客甚則為矯激不情之事外欲釣君子之名而內實市輩之不若此心一起則朝夕之所以經營擾擾者無非為名其實亡一毫實利及下非惟名不可得且適足為識者之譏豈知官職固自有分詎可以沽名得是是非非久而自定要當盡其在我而民被實惠足矣防吏弄權胥吏之駔儈姦黠者多至弄權蓋彼本為賕賂以優厚其家豈有公論若喜其駔儈而稍委用之則百姓便以為官司曲直皆出彼之手彼亦妄自誇大以驕人往往事亡巨細俱輻湊之甚至其門如市而目為立地官人者彼之賄賂日厚而我之惡名日彰殊不知官長本不知也凡事冝自察其實自執其權不可徇吏同僚貴和同僚冝和而不和者多起於廳吏之間諜彼此胸中藴蓄不曽吐露至有一發而遽傷和氣不可不察始至須明以此相告語凡有嫌疑宜悉面白毋包藏怒心以中廳吏之姦計間有凶險不可告語者宜待之以禮而優容之使彼潛消其狠戾足矣若戞戞焉與之相較於是非之間則我與彼一等人耳防間子弟凡在官守汩於詞訟窘於財賦困於朱墨往往於閨門之內類不暇察至有子弟受人之賂而不知者蓋子弟不能皆賢或為吏輩誘以小利至纍及終身昔王元規為河清縣軍民歌詠以民吏不識知縣兒為第一竒蓋子弟當絶見客勿出中門仍嚴戒吏輩不得與之交通又時時密察之庶幾亡弊不然則禍起蕭墻矣嚴內外之禁閨門內外之禁不可不嚴若容侍妾令妓輩教以歌舞縱百姓婦女出入貿易機織日往月來或啓子弟姦淫或致交通關節蓋外人覩其出入深熟囑之以事彼有所受訟至有司事干閨門尤難施行要在責閽人禁止仍常加察不然恐有意外之事防私覿之欺凡醫術遊謁之士固不能絶其謁見然謁見之數不能亡嫌間有私覿者必接於公廳蓋十目所視可防其妄以關節欺人頃年嘗覩一術士受賂於袖詐言以與官人傍則令所賂之人逺觀彼見其接之私室與之私語以為誠然逮至興訟無以自明矣戒親戚販鬻士大夫間居時親戚追陪情意稠密至赴官後多私販貨物假名匿稅逺至官所以求售居官者以人情不可却或館之廨舍或送之寺觀以其貨物分之人吏責之牙儈而欲取數倍之利甚則縱其交通關節以濟其行一旦起訟咎將誰歸要當戒之於未至之先或有為貧而來者冝待之以禮遺之以清俸亟遣之歸毋令留滯責吏須自反今之為官者皆曰吏之貪不可不懲吏之頑不可不治夫吏之貪頑固可懲治矣然必先反諸已以率吏夫富者不為吏而為吏者皆貧仰事俯育喪葬嫁娶凡欲資其生者與吾同耳亡請給於公悉藉贓以為衣食士大夫受君之命食君之祿尚或亡厭而竊於公取於民私家色色勒吏出備乃反以彼為貪為頑何耶故嘗謂惟圭璧其身纎毫無玷然後可以嚴責吏矣燕會宜簡為縣官者同僚平時相聚固有效郡例厚為折爼用妓樂倡優費率不下二三十緡者夫郡有公帑於法當用縣家無合用錢不過勒吏輩均備耳夫吏之所出皆民膏脂以民之膏脂而奉吾之歡笑於心寧亡愧兼彼或匱乏典衣質𥜗以脫捶楚吾雖歡笑於上而彼乃蹙頞於下况郡有郡將如家有嚴君子弟不敢狎縣家同僚彼此如兄弟用妓之數必至於褻終招謗議故縣官於公退休沐之暇宜以清俸為文字飲不妨因而啇榷職事物雖不足而情有餘矣吏言勿信為政中和則百姓有所恃雖不囑吏其心不恐故吏大率多欲長官用嚴嚴則人畏其不測彼得乘勢以挾厚賂如催科本寬彼則獻説曰今虧常賦若干寬則人玩而弗輸故長官之信吏者必轉而為嚴及彼得賂則催科遲滯而彼亦不問矣期限本寬彼則獻説曰是民俗素頑寬則人玩而不畏故長官之信吏者必轉而為嚴及彼得賂則限期違戾而彼亦不問矣故凡吏有獻説者須察其可行不可遽聽要在寬嚴適中則亡弊矣時加警察治一縣者須一縣事皆在胸次治一州者須一州事皆在胸次蓋州縣事繁易至遺忘留意者曉卧多不安枕當反復致思今日有某訟事當若何剖決上司有某限期當若何報聞禁繫有何人當釋財賦有何色當解晨出則擇要緊者記録於牌置之坐隅起處以對仍掌以廳吏隨畢隨銷暮則呈其所記未畢者録於次日當公退無事又時時警省則政事無廢弛限期無違戾禁繫無寃民賦財無稽緩而公家事辦矣晨起貴早被底放衙昔者嘗以為戒凡當繁劇要須遇雞鳴即起行之有常則凡事日未吳俱辦而一日優遊間暇矣倦於起早或遇賔客過從往來迎送奪其日力則一日之事俱不辦一日之事不辦則明日之事益多况凌晨神氣清爽心無昏亂故早起亦為官第一䇿昔魯文伯母言卿大夫一日勤事之節曰朝考其職然則古人亦審此久矣事無積滯公事隨日而生前者未決後者繼至則所積日多坐視廢弛其勢不得不付之胥吏矣凡文書之呈押與訟事之可剖決者要當隨日區遣無致因循行之有凖則政有條理事無留滯終於簡靜矣情勿壅蔽受狀當有定日否則門禁稍嚴或被劫奪急投追捕或因垂命急欲責詞或被重傷急欲驗視多阻於閽人而情不得逹兼有倦於出廳者吏鴈鶩行終日抱成案伺於階前幸其一出紛拏呈押或復憚其繁冗往往漫不加省不過隨其手摘俯首書字而已民何賴焉公廳􅙳袒非宜宜於公廳之側闢一室通內外聼訟於斯飲食於斯讀書染翰於斯嚴戒閽人俾民吏凡有警者非時皆許直造則情無壅蔽事無稽滯若晝居於內俾吏民欲見其面而不可得者誠當官之大戒四不宜帶親隨僕若醫若僧道四者俱不宜帶夫彼之隨來其意必有所覬人見其親密往往有掣肘事多宛轉囑之彼固自知其不敢言然意在罔利不得不設辭以相誑或僥幸偶中則人必以為真此輩通關節不中則取賂至訟在我無以自明矣况親隨僕置之於中門之內則往來之亡禁妾婢之交雜誠為難防置之於外則入酒肆遊妓館交通吏民靡所不至誠不若不帶之為善三不行刑一我醉二彼醉三羸瘠蓋我醉而行刑則易至過誤傍觀必以為使酒彼醉而行刑則醉中忿怒不知守分或無禮過甚則事干刑憲難於施行羸疾者多因監繫日久飲食不時僅存皮骨若遽加刑必有斃於杖下者須資以飲食俟其稍蘇然後杖之其他如夜不行刑病不行刑有法令在俸給無妄請俸給茶湯有定制職田添支有定例其間有非所當得者往往前後循襲冒請不知其非要當於始至之日一一稽考受其所當受無專徇利防市買之欺始至之日必密訪市之物價如官價有虧則從市價晨起量其所買先以錢給買者仍書于牌俾眂錢付物毋得賖鬻所用權衡之屬務在公平過重則買者不過強取於市而已旬日若月終又須刷其虧欠之有無不然則彼得以恃勢為姦矣怒不可遷今日為官者事之不如人意十常八九或公家事偶拂其意或閨門之內方有私忿怒見顔面臨事乘勢將亡辜人決撻以泄怒氣是遷怒也故當怒時必持之以寬忿怒既消心平氣和矣盛怒必忍人有咆哮非禮大拂乎吾意者須且置之囹圄優遊和緩處之以法若一時乘其暴怒而痛加捶楚必求快意而後止則恐至過傷悔之亡及疑事貴思官司凡施設一事情休戚繫焉必考之於法揆之於心了無所疑然後施行有疑必反復致思思之不得謀於同僚否則寧緩以處之無為輕舉以貽後悔勿聽私語廳吏有所求不如意或受人私囑將以中傷乎人者知其不可明言乃於長官啓處之側自相告語令其聽聞往往有不察其實遽將無辜人捶楚以中姦計者甚有其言先入而終不可解者不知無故之語必有其故豈可遽信勿差人索迓間居驅役私僕往往多酬以索迓至則吏輪備飲食行則衆裒金以與之雖云有例然先聲已不佳矣邇來官所多以是預占新官之賢否况代者失歡多起於來者欲速去者欲緩彼此失體故瓜期既近合俟見任交代先通訊不然則或宛轉寄音或批付典吏若非愆期不宜輒差人
