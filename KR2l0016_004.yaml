  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2l0016_WYG_004-1a, image: WYG0602/WYG0602-0647a.png}
body:
  text: 州縣提綱卷四亷則財賦給有一邑之土地斯有一邑之常賦有一州之土地斯有一州之常賦或至匱乏者多起於守宰之不亷蓋守宰亷則吏為欺弊猶有忌憚守宰不亷則已盜其一吏盜其十上下相蒙恣為欺隱其終未有不至匱乏者故理財當以亷為先又時時檢核滲漏無有不給畫月解圖視事之初須計一歲所入之數與所出之數有無虧贏有虧則公勤措畫常賦月解須畫為圖軸置之坐右朝夕以對已解者隨即朱銷故色色財賦舉目可見必不至於懵然不知違戾限期矣整齊簿書縣道財賦本源全在簿書鄉典姦弊亦全在簿書大率縣邑賦籍每户折色必據稅總數而科如某户元稅若干收若干推若干今總計若干然後合科折色某物若干逮輸即於折色每項注某月某日某號鈔納若干遇點追揭籍欠之多寡曉然在目或者不然夏秋稅籍止載某户收若干推若干不總結今計數若干惟無今計總數故鄉典受賕隨時更改或續添收一項不見其多或續再推一項亦不見其寡况既收矣續受囑輒注云誤收既推矣續受囑輒注云誤推或於誤推誤收之下又有的推的收自知欺弊已甚憚其核究則又故為草書小字令人不可曉會兼甲乙交易甲已推而乙不收乙已收而甲不推者比比皆是惟無今計總數故所敷折色與稅之多寡不相應是以財賦走失不可勝言而差役無憑習以成風恬不為怪更加數年則有賦者亡産有産者亡賦不可稽考矣必須於賦籍勒一一大字楷書今年某户稅元數必照與去年今計總數同仍於今年推收之後總結一今計實數折色則據今計數而敷總數之下斷不許改易添注凡有收者必照推有推者必照收故推收有凖折色與稅始相當而財賦無走失矣關併詭户今之風俗有相尚立詭名挾户者每一正户率有十餘小户積習既久不以為怪非惟規避差科且綿歷年深既非本名不認元賦往往乾收利入已而毫毛不輸官者有之蓋詭名挾户鄉典悉知須勒從實關併則財賦不至走失而差科均矣追稅先銷鈔二稅之輸簿廳不即憑官鈔銷籍異時按籍而追至有已輸而枉被擾者凡未追之前須勒鄉典以官鈔銷籍淨盡結罪保明實欠然後點追揭籍點追稅頑民違省限不輸官物未免點追若縣令不親揭籍惟憑吏具數呈點故多者以賂獲免而所追者無非貧弱矣蓋人户挂欠之多寡具在省籍要當親揭點追毋令具數庶幾均平收支無緩官司收支必分委佐官凡一日賦財出入之數詳給文歷既晚不可復請官若錢在吏手多輒令設法於當日晚權收於外匱差吏一名照數點入用鑰封記翌早即請官監入庫無至因循又旬終須計見存數委官點視庶無案此下原本有闕文帑吏擇人帑吏必擇信實老成人仍召有物力者委保蓋賦財繁夥用之非其人或至盜用無可追理異時不過誣攤平人有司不令均償則彼亡所從出官帑有虧若令均償則擾及亡辜要須預防之可也搜求滲漏長官日困於應酬賦財文書凡目既多往往不暇詳究兼前後交承首尾不相應以至滲漏者甚多或支數與收數不同細數與總數有異或上歷支解而復收入已或已解及數而漲數虗解或以單子脫解而不上籍或以鈔脫解而不上歷似此之類不一而足故收支須月終磨核解錢必持單子若簿歷鈔同押始判支如印鈔及批歷稽遲即須監索募役不禁邑有户長居於鄉村其間平生未嘗至官府者若必勒親身自充非惟不知詭名挾户且不慣催科徒遭刑責費既不資甚至破家於法許募者合從其便蓋一鄉户長必有平昔專代充之人詭名挾户逃亡死絶彼無不知故催科不勞而辦要須募信實人仍召市户一名委保不然則不許募亡賴慣受杖者應限催科省刑縣官催科引呈户長日不下四五十人訊杖違法過數則日不下三千以月計之所訊幾十萬矣積而至於三載不知其幾千幾萬而決撻不預焉雖云奉公行法然呼號之聲上徹于天其間豈無濫及痛楚誰其酬之倘能遏弊源出信令核虗實崇勸誘固不必專尚訊撻也革催數欺弊户長當限引呈催數多寡率計於吏手縣令豈能一一悉知往往吏得賂則以催少為多故僥幸免罪不得賂則以催多為少故枉受刑責要當於引呈時不測點一二名核數則多寡顯然在目而為欺者有所忌憚矣户長拈號給册民户有樂輸有抵頑有逃絶總一都內造册一扇於中立一二人催理且甲户力厚則囑吏以樂輸則詳載其名于册故催理易辦其不樂輸及抵頑之户别立其名無使弱者受害苦樂不均須勒吏先以一都內所有逃移絶户均為二册各立號仍别書于􅍐令甲户至官隨意拈之庶絶私囑之弊受納苖米勿頻退輸納苖米不中則退而弗受蓋欲其換納耳然所退動輒數十石至百石彼豈能盡易别米入納不過續變易姓名復將退米再輸受納官既不能一一辨認徒見出入擾擾耳故除雜水濕者勿領外自餘有粳粃或粞碎之類不若止令就倉篩揚潔淨然後領之優自輸人户邑井攬户與倉斗深熟鄉村自輸人户與斗子不識當交量時往往輕重其手致令自輸人户折米與攬户要當時時覺察而優異之毋令刁蹬村民庶使其自輸禁擅入倉詣倉受納止可容斗子及輸納之户其無干預人悉令出倉無使在內指倉斗等為由陽為乞覔隂為偷盜紛然案紛然下原本闕文當廳給鈔受苖每名數足隨即印鈔靣還人户毋致出倉其鈔於本廳印給亦勿令吏收鈔自給蓋逺鄉之民固有因循不取終於無執手者若夏稅則尺寸竒零鈔數繁多必類聚一日所輸翌日印給如苗鈔不即給夏稅鈔翌日不給許其不時執覆根究施行
