body:
  text: 州縣提綱卷二判狀勿憑偏詞訟者之詞大率自掩其過而歸咎於人甚至鑿空撰造以欺有司若今日甲訟乙輒憑偏詞以甲為是明日乙訟甲又憑偏詞以乙為是逮二詞並至而吾之所判已矛盾矣故判狀勿憑偏詞必得活法若其詞無理者不加詰問則投狀者必多一狀之出牽聯追逮未至有司而其擾已甚矣兼有一等無圖人本欲脫狀牽擾良民覔賂休和其實不敢對辨故覽其詞無理必反復窮詰灼無可疑則勿受斯妄詞者寡而良民得以安居未見情實不若平辭而判俟二競俱至然後剖決未晚成周大司冦以兩造禁民訟吕刑兩造具備而後師聽五辭蓋懼其以偏詞定曲直也判狀勿多追人訟者元競本一二人初入詞類攀競主之兄弟父子動輒十數人甚至與其夫相毆而攀其妻為證與其父相毆而攀其女為證意在牽聨人數陵辱婦女輒謂得勝若不自我點追而一付之於吏則吏必據狀悉追亡一人得免卒輩追一人則有一人賂執判在手引帶惡少數輩名曰家人騷動乞覔雞犬一空稍不如意則穿聨滿道未至有司而其家已破矣故必量事之緩急輕重如大辟劫盜之屬緩則逸去勢須悉追餘如婚田鬬毆之訟擇追緊切者足矣婦女非緊切勿追示無理者以法官僚胥吏明法尚寡小民生長田野朝夕從事於犁鋤目不識字安能知法間有識字者或誤認法意或道聽塗説輒自以為有理至謀於能訟者率利其有獲惟恐不爭往往多甘其辭以誘之故彼終於傷肌膚破家産而不知悔原彼之意蓋自以為是耳使自知其無理何苦於爭亦嘗念愚民之亡知兩造具備必詳覽案牘反復窮詰其人果無理矣則和顔呼之近案喻之以事理曉之以利害仍親揭法帙以示之且析句為之解説又從而告之曰法既若是汝雖訴於朝廷俱不出是耳使今日曲法庇汝異時終於受罪汝果知悔當從寬貸不知悔則禁勘汝矣稍有知者往往翻然自悔或頓首感泣以訴曰某之所爭蓋人謂某有理耳今法果如是某復何言故有誓願退遜而不復競者前後用此䇿以弭訟者頗多如頑然不知悔始置之囹圄盡法而行自後往往不從勸諫者蓋寡如不先委曲示之以法而驟刑之彼猶以為無辜而被罪宜其爭愈力而不知止勿萌意科罰凡訟至有司不宜先萌意科罰蓋萌意科罰則或發富家之隂私或牽聨富家之婦女者往往以為竒貨其心必喜喜則行之必嚴追逮必衆其事本細張皇成大指顧可以破人之家殊不知張官設吏本為理民曲直耳今不問曲直而利於取財以破人之家於心寧無愧於君寧無負於幽明寧無責可不戒哉面審所供吏輩責供多不足憑蓋彼受賂所責多不依所吐往往必欲扶同牽合變亂曲直山谷愚民目不識字吏示讀不實若憑所供輒斷而不面詰之則貧弱之民無辜而受罪矣凡吏呈所供必面審其實如言與供同始判入案或言與供異須勒再責若供不當廳而令其下司則豪強之人教唆之徒公然據司案而坐指揮叱吒變亂情節善良之人有寃無告矣呈斷憑元供二競者之詞悉見於親供或憚案牘之繁不暇遍覽將結斷時案吏則以案具始末情節引呈蓋欲便於觀覽也不知甲乙對競甲之賂厚則吏具甲之詞必詳乙之詞雖緊要者亦且節去以此誤長官之判多矣既有元詞自當詳覽以定曲直又具情節適為贅耳詳閲案牘理斷公訟必二競俱至劵證齊備詳閲案牘是非曲直了然於胸次然後剖決蓋人之所見有偏若憚案牘之繁倦於詳覽遽執偏見自以為得其情而輒剖決者其過誤多矣詳審初詞訟者初詞姓名年月節目必須詳覽蓋案牘動至數萬言雖若繁夥然大率不出乎初詞儻後詞與前異前詞所無而其後輒增者皆為無理若夫獄囚所招則先隱其實旋吐真情又不可例憑初詞通愚民之情健訟之民朝夕出入官府詞熟而語順雖譊譊獨辨庭下走吏莫敢誰何良善之民生居山野入城市而駭入官府而怵其理雖直其心戰惕未必能通若又縱走吏輩訶遏之則終於泯默受罪矣凡聽訟之際察其愚朴平昔未嘗至官府者須引近案和顔而問仍禁走吏無得訶遏庶幾其情可通交易不憑鈔田産典賣須憑印券交業若券不印及未交業雖有輸納鈔不足據憑蓋白券可偽造賦稅可暗輸昔劉沆丞相知衡州時有大姓尹氏欲買鄰人田莫能得鄰人老而子幼乃偽為券及鄰人死即逐其子訴二十年不得直沆至又出訴尹氏出積歲所收户鈔為驗沆不憑鈔而詰其元買非實始服罪事有適然類此者宜加察焉誣告結反坐近世風俗大率初入詞輒以重罪誣人者不可不察如白日相毆於路則必誣曰劫奪入於其家而相競則必誣曰搶劫與其婦女交爭則必誣曰強姦墳墓侵界則必誣曰發掘骸骨似此類其真實者豈可謂無但鑿空假此以為詞訟之常談者可怪耳甚至公然以大辟誣人略不知懼且有一人病且死與甲初無預而甲妄認親屬誣乙毆死乙固知其無罪然事屬大辟有司不敢不受勢須委二官檢覆吏胥之追求里保之乞覔一鄉騷然幸值明有司早得脫而其家已破矣或吏用事置之縲絏卒未得直故良善畏事之家往往多厚賂求休息為甲者無故而獲千金故鄉俗目之曰經紀萬一乙不賂至有司淹延日久窮見實情甲之罪不過杖一百耳蓋縣家凡一事解郡所費不資或郡吏求疵疏駮罪反及身故縣家多從末減此風所以滋長而無忌憚也似此誣告必先勒結反坐果誣必結解盡法而行庶懲一戒百內有畏反坐者輒令老人婦人入詞故老人須追子婦人須追夫同結反坐後追究禁告訐擾農頑民健訟事或干己猶有可諉事不干己可不力懲且冒占逃絶户産若匿牙稅之類在法固許人告使告果得實豈但追逮奈有一等無圖之人不務農業當農事正急時輒乘間以此誣告擾農民邀挾錢物方其訴時未必一一知其實惟擇善懦或有讎之家泛然入詞以僥幸其一中且如告一户冒占畫一不下數十項有司追究不盡則恐終不能絶詞若悉追究則牽連動是數十人淹延動是數月都保之追逮鄰里之供證一鄉騷然良民業在務農耕耘一失其時則終嵗飢餒往往不憚厚賂以求和或不賂則至於有司窮究得直彼不過負妄訴之罪而被訴之家所損已多矣在法諸婚田之訟自二月以後為入務今縣家多畏誣告者之健訟兼或撰造經郡若監司脫判送下往往未必入務故不務農之人得以乘其農急而規財使務農者不得安業要當候務開日追究或係郡若監司送下亦宜具此利害申聞告訐必懲鄉間之弊莫大於姦民得志而良民受害夫安分之人業在田畝自幼至老足未嘗躡官府事切於己尚隱忍不欲訟其有不務農業專事健訟者欺其善懦往往搜求其短誣告挾賂縣令不明則吏置之獄枝蔓追究必破其家縣令茍明追證既備罪有所歸則誣告者懼罪不待理斷而妄飾其詞今日走郡明日走監司脫其轉送或索案則又因循迤邐以幸脫矣此姦民所以終於得志而良民受害故凡投詞有事不干己者必加懲治無使脫判以害良民請佃勿遽給姦民密知人有産無契若有契未印若界至不明輒詐作逃絶乞佃脫判會實囑里正耆鄰扶同誣申案吏利其厚賂不問是非遽憑偏詞給據彼既得據輒爭奪交業固有今日方携據而去而明日相毆而來甚至殺傷者有司追究問之里正則曰鄰人問之鄰人則曰里正其實皆里正受賕勒其為鄰而彼實不知又或以佃者為鄰或以親戚為鄰故必反覆得實仍勒里正結罪保明俟差鄰都再會如不實或續有人競必先抵里正罪庶知忌憚證會不足憑鬬毆必追證而證不可憑一人之詞爭界必會實而會不可盡信耆鄰之説蓋富者有賂則可以非為是貧者無賂則可以是為非專憑證會則凡貧弱者皆無理矣鬬毆之訟必察其人之強弱情之是否爭界之訟須令詳畫地形考之契要反覆參究必得其實然後可決再會須點差里正會實受賕偏曲或乞差鄰都再會若憑吏擬差或受賕再差其親密則偏曲如初卒不得直故必自我點差使之不測聽訟無枝蔓詞有正訴一事而𢃄訴他事者必先究其正訴外帶訴事須别狀蓋聽訟不宜枝蔓枝蔓則一事生數事曲直混淆追逮必繁監繫必久吏固以為喜而民乃以為病矣若夫枝𣲖異而本同一事者又不可以是論立限量緩急立限寬嚴必量事之緩急不量緩急而一切以緊行之則緩急雜亂承限者抵罪必多勢不可久其終必至於緊與緩者俱違戾矣是以信牌之類不可常出常出則人玩惟上司緑匣追會及大辟強盜時出而用之違者必懲故人不敢慢緩急可以辦事立限量逺近催科若訟常限須關佐官廳同一日如一都十一都二十一都則以初一日十一日二十一日二都則以初二日十二日二十二日之類非惟整齊無雜亂易稽考且里正户長一月止三日在公優間多矣時焉有上司追會有大辟有劫盜有寃抑者不可拘常限故不得已而用破限焉破限必量地逺近蓋逺鄉往返有四五百里者若初限例與一二日追會不至而輒撻之則是責人以其所不能也里正受賂詐以所追人出外或病而妄申者固其常矣其間豈無實出外者豈無實病者必酌情而行庶亡寃濫催狀照前限里正領狀違滯詞首未免催限蓋狀有常限有破限若再狀不照元狀日限則前後限參差不齊雜亂無據故再狀必勒吏先照元展日限朱批於狀首再判必同元限則限無矛盾易於稽考如經久不至則改緊限或信限以速之庶幾有寃不至無告柵不留人訟者始至填委慮其逸去多先置於柵直柵者邀挾不如意輒閉留終日飢不得食寒不得衣遇盛暑數尺之地人氣充牣多至疾病要須於始至時即監召保毋得入柵關留察監繫人二競干證俱至即須剖決干證未備未免留人承監人乞覔不如意輒將對詞人鎖之空室故為飢餓不容人保又或受競主之賕以無保走竄妄申官司不明輒將其人寄獄者多矣凡承監須令即召保不測檢察如不容保故為鎖繫必懲治之仍許親屬無時陳告或果貧而無保須度事之輕重或押下所屬追未至人里正副勿雜差里正副分上下半月本欲受差均耳有合受上半月者重難事輒囑吏留於下半月呈遣利賂事本下半月合受者輒作妨嫌差上半月苦樂不均弱者受害要當嚴分上下半月之禁無得雜差行之有凖雖曰兩年充役實則一年故人皆樂充罕有爭競在處里正事體雖不同或有似此者固當知也用刑須可繼縣官追逮多責里正里正違初限未可遽杖且要緊事追人初限五日不至遽撻之矣次限又不至不再撻則益見緩慢而前杖為虛設再撻之則五日內杖瘡必未痊非惟法所不許兼恐過傷罪在慘酷故初限未至不若量訊或封案或錮身示以不測不專用杖蓋縣令之威不過杖一百耳用之未盡則彼猶勉強以自逭遽盡用之其如不可繼何戒諭停保人鄉人之訟其權皆在聽信安停人以為有理則爭以為無理則止訟之初至須取安停人委保內有山谷愚民頑不識法自執偏見不可告語者要須追停保人戒諭庶或息訟執狀勿遽判事有涉不法恐異時有競而先欲張本者輒多端脫判執狀以為異時交爭之證要當審其事之利害未可輒判如遺失契書之類必究實如婦人乞改嫁之類必追會果得實然後坐條告示其他非要緊執狀判語須活不可偏執緊限責病詞狀乞責病者之詞必其人垂死若立限稍緩未責詞而已死無緦麻以上親在傍合委二官檢覆非惟檢覆之官一出鄰里騷然兼格目申憲司寧無疏駮要當榜示許不拘早晚披陳所判須仰即往不可如常限三日五日恐稽緩終至委官擾擾矣隨宜理債官司有阿從豪民者凡債負不問虛實利息過倍一切從嚴追理則豪民必至兼并小民有寃亡告又有矯是弊者不問是非一切不理則豪民不敢貸一遇歲飢或新陳未接小民束手相視餓死本欲恤之而不知反以害之要在平心遵法而行耳受狀不出箱出箱受狀其間有作匿名假名狀投於箱中者稠人雜遝莫可辨認兼有一人因便投不要緊數狀及代名數人者要當於受狀之日引自西廊整整而入至庭下且令小立以序撥三四人相續執狀親付排狀之吏吏略加檢視令過東廊聽喚姓名當廳而出非惟可革匿名假名之弊且一人止可聽一狀健訟者不得因便投數詞以紊有司判狀詳月日覽狀必詳其發端月日蓋事有要緊者必即訴于公經數月而後始入詞者必非要緊須詰其因何稽緩如詞內隱其月日而不言者必已經久或在赦前須令再供然後施行籍緊要事州縣一畨受狀少不下百紙內不要緊者甚多程限簿一概主之於吏若欲一一親檢察則精力不逮緩急俱廢要當擇事干緊要若情有寃抑若上司委送者别籍置之案明載日限日率一閲違滯則追庶亡稽緩案牘用印田産之訟官司考之契要質之鄰證一時剖判既已明白無理者心服無詞有理者監繫日久一得判輒歸未必丐給斷憑元案張縫率不用印數年之後前官既去無理者或囑元主案吏拆換或賂貼吏竊去兼主案吏若罷若死輒隱匿詐言不存彼乃依前飾詞妄爭有理者須執前判無所考據則前判皆為虛設矣凡事判案須即用官印印縫仍候給斷憑訖始放無輕役民公廨有傾則必修有敝則必葺無致因循頽毁以貽後費至利民之事如建學校開溝渠築隄防立城壁之類必於農隙盡心力而為之若起臺榭廣園沼以為無益之觀美者力有未及宜小緩蓋勞民役衆寧無怨嗟和買竹木寧亡騷動在審其緩急輕重耳昔盈川令政慘酷惟專務造亭臺書榜額為美名宜其為逺近笑耳籍定工匠役工建造公家不能免人情得其平雖勞不怨境內工匠必預籍姓名名籍既定有役按籍而雇周而復始無有不均若名籍不定而泛然付之於吏則彼得以並緣為姦本用一人輒追十人藝之精者反以賂免而不能者枉被攀連不得脫非惟苦樂不均且建造未成而民間已騷然矣但置籍之始須括得實無使里正與夫匠首者因讎誣供則其籍始可用耳示不由吏凡親民之官稍有知者孰不欲平心以決事然事有不得平者蓋由姦豪居鄉則殘虐細民在公則劫持胥吏訟至有司胥吏奉承其意惟恐或忤以至以曲為直以是為非長官不明不公者則唯吏是從間有公且明者一切自出已見彼之訟不勝輒以胥役受賂妄訴吏者多矣吏何足恤但姦民得志吏益畏憚小民之屈愈不可伸故凡吏呈事案須先引二競人立於庭下吏置案於几斂手以退逺立於旁吾惟閲案有疑則詢二競人俟已判始付吏讀示蓋將以示其曲直不出於彼非惟吏不得以詐取民財且俾姦民無歸咎於吏而妄訴矣詳畫地圖迓吏初至雖有圖經粗知大槩耳視事之後必令詳畫地圖以載邑井都保之廣狹人民之居止道塗之逺近山林田畝之多寡高下各以其圖來上然後合諸鄉邑所畫總為一大圖置之坐隅故身據廳事之上而所治之內人民地里山林川澤俱在目前凡有爭訟有賦役有水旱有追逮皆可以一覽而見矣昔吕惠卿雖不足言觀其以居常按視縣圖究知鄉村地形高下為治縣法蓋亦有所見也户口保伍縣道户口保伍最為要急儻不經意設有緩急懵然莫知始至須令諸鄉各嚴保伍之籍如一甲五家必載其家老丁幾人名某年若干成丁幾人名某年若干幼丁幾人名某年若干凡一鄉為一籍其人數則總於籍尾有盜賊則五家鳴鑼撾鼓互相應援或遇差役起夫水旱賑濟皆可按籍而知誠非小補修舉火政治舍及獄須於天井之四隅各置一大器貯水又於其側備不測取水之器市民團五家為甲每家貯水之器各置於門救火之器分置必預備立四隅各隅擇立隅長以轄焉四隅則又總於一官月終勒每甲各執救火之具呈點必加檢察無為具文設有緩急倉卒可集若不預備臨期張皇束手無䇿此若緩而甚急者宜加意焉禁擾役人爭役之訟多起於縣家非泛科需案非泛猶云非常蓋宋時有此語期限嚴迫不時鞭撻兼吏輩每限過取役未滿而家破故力爭以冀幸免若盡絶非泛科需量地逺近立限凡事皆酌其輕重而少寬之又嚴禁吏每限亡過取則人樂其優恤爭先願充又何競之云差役循例差役素有則例如某都里正元例差及稅一貫文止不可輒差未逮一貫文者如某保戶長元例差及稅三百文止不可輒差未逮三百文者或及元則例之家比向來頓減止三家二家長充而未及則例之家有稅力優厚可以任役者又在隨宜更變酌中差役物力既高歇役且久充役無辭要其所爭多起於稅高而歇役近者則以輪差之法而糾稅少歇役久之家稅少而歇役久者則以歇役六年再差之法而糾稅高歇近之家有司牽制多不能決切照將朱批户歇役六年與白腳户比差之文凖紹興二十八年六月一日指揮已刪去矣詞按切照以下共三十五字原本亦作正文據上下文義似後人見上文歇役六年之法非現行事例因而加注以明之者今改用小字附書今若將歇役六年者輒再差則此稅高者長充其餘力能任役者永得優間其害在上户矣若將稅及元則例人周而復始一槩輪差則稅過五倍十倍者充二年而稅少五倍十倍者亦充二年其害在下户矣二者皆未均要當以見行條法參物力高下歇役久近酌中定差如稅過數倍歇役十餘年則亦可以再差矣不然則且差稅及元則例歇役年深之家其間有析産白腳物力及則例者自合先充禁差役之擾縣令不明則吏因差役並緣為姦如差甲得賂輒改差乙差乙得賂輒改差丙本差一户害及數家爭競擾擾久而莫定故差役之先必嚴責所差吏罪狀如被差人有詞則令供合充之家當廳索差帳與籍參究定差無至再誤如始差不當必罪元差吏役須預差在法役將滿合先一月預差蓋爭競遷延前者既滿勢須與替後者未定煙火盜賊誰任其責須先一月勒吏詳審定差如差已當枝辭未伏須令權就役候追究有理則將充過月日與將來應役月日通理常平審給常平義倉本給鰥寡孤獨疾病不能自存之人每歲仲冬合勒里正及丐首括數申縣縣官當廳點視以給蓋防妄冒然里正及丐首藉是以求賂有賂非窮民亦得預無賂雖窮民不得給兼由丐首括數而得給者往往先與丐首約當給米時則分其半疾病孱弱者不能行履所給或盡為丐首奄為己有不然亦裒常例而丐者所得無幾矣夫丐首強壯亡疾病一家率數人蠶食於常平而又強掠如是其弊可不革哉要當嚴禁其乞覔不公之弊遇初冬散榜令窮民自陳庶幾常平不為虛設安養乞丐歲飢丐者接踵縣無室廬以居之往往窮冬嚴寒蒙犯霜雪凍餓而死者相枕藉於道矣州縣倘能給數椽以安之豈不愈於創亭榭廣園囿以為無益之觀美乎昔范公祖禹奏乞增蓋福田院官屋以處貧民至今為盛德事士大夫毋以為緩而不加之意收撫遺棄凡任宅生字民之寄要須視民如子一人號呼不得其所當任其咎且歲飢遺棄孤幼於道者紛紛不收而字之何以為民父母凡周歲至四五歲者未能自支持徒知收撫而不時時親檢察其終必死耳要當於要近處闢一室以處之仍專責一二人視養而又時時親檢察如撫己子焉則所活必多宅生字民之職始為亡愧昔元魯山所得俸祿悉以衣食人之孤遺天下至今稱之月給雇金縣有弓手手力役於公家悉藉月給以為衣食縣家常賦不辦往往越數月不給彼之仰事俯育喪葬嫁娶迫乎其身弓手不過假捕盜鄉閭執縛良民騷擾百出手力亦不過假監繫害民以覔厚賂實縣令有以致之故財賦不辦須措畫有方若雇金須按月而給蓋在我無虧於彼彼或害民以陷於罪懲治雖嚴而亦無詞無怨矣州縣提綱卷二考證十七頁前五行按盈川令下不著姓名疑原本有脫誤今姑仍其舊二十一頁前二行按小注云云原本誤作正文今據上下文義此數語當係後人所增謹改正
