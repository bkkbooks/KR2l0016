body:
  text: 州縣提綱卷三捕到人勿訊大辟刼盗捕至之初例於兩腿及兩足底輙訊杖數百名曰入門杖子然後付獄不知其在都保或廵尉司綿歴多日飲食不時饑餓羸弱兼為承捕人考掠其傷已多若不先驗以備不測又從而酷訊之往往至獄即病方鞫情状而其人或死矣既死合委官驗覆若㾗在致命罪屬惨酷至累終身故始至須躬問大情仍驗有無傷始付獄戒給飲食然後鞫之異時生殺自有常憲不必於其初輙酷訊之也况捕至之初罪辜未明一例輙訊異時推鞫無犯追悔亡及革囚病之源囚之所犯自有常憲死於非法長官不得不任其咎若縣道則多無囚糧貧亡供送者多責之吏吏饘粥自不給往往經日不與或與之微不能充飢况又時加考掠得疾以至於斃者多矣兼囹圄不掃匣杻不潔穢氣熏蒸春夏之交疫癘扇毒至有負死囚接踵而出者憲司嵗計人多罪何所逃故貧亡供送者官須日給米二升以為飲食重囚則差人入獄監給輕囚則引出對面給庶免减尅當春則深其獄之四圍溝渠蠲其穢汙俾水道流通地無卑濕而又時時洒掃使之潔净嚴冬則糊其忩牖給之襖襪庶令温煖盛暑則通其忩牖間日濯盪由是疾病無自而生惟時時留心檢察是數者亦庶㡬古者欽恤之意疑似必察昔呉太子孫登嘗乘馬出有弹丸過左右求之適見一人操弹佩丸咸以為是辭對不服從者欲捶之登不聽使求過丸比之非類乃釋盖情有似是而非似非而是者苟其辭未伏不可不審也若辭已伏而渉疑似亦未可輙信盖在囚日乆考掠不勝苦亟欲出獄不免誣伏不察其實而輙結案以解或已殺之後而真犯者敗死者其可復生乎昔薛奎為温州軍事推官時有民常聚博僧舍一日盗殺寺奴取財去而博者四人適至啟户濺血汚衣遽驚走邏者因捕送官考訊己引伏矣奎獨疑之請緩其獄後數日果得殺人者他如錢公若水為同州推官辨女奴事向公敏中在西京辯僧殺婦人事皆已誣服後平反其獄亦世所稔聞史傳似此不可枚數凡事有渉疑似者雖其辭已伏亦須察之以緩或終扵疑罪須當從輕古人要囚服念五六日至于旬時者盖為是耳詳究初詞昔劉公安世謂宋若谷治獄有聲惟曰獄貴初情分牢處問而己今之縣獄初詞乃訟之權輿郡獄悉慿之以勘鞫凡里正及廵尉解至犯人多在外經停唆教變亂情状若縣令不介意而輙付之主吏則受賕偏曲一律供責其後欲得真情難矣如解至犯者十名即㸃差他案貼吏十名各扵一處隔問責供頃刻可畢内有異同互加参詰既得大情輕者則監重者則禁然後始付主吏雖欲改變情欵誣攤平人不可得矣入獄親鞫吏胥之老成者與百姓讎隙多已訴罷見役類皆後生不歴世事不識條法惟知乞取贍家今以大辟及強盗付之則生殺在其手豈無寃濫故凡獄事始至須入獄親鞫冀得真情若經乆吏受賕變亂其實害及無辜必矣事須隔問書云察辭于差盖事之實者不謀而同凡有差者皆非真情也獄事須分處隔問無令相通衆説皆侔始得其真如有矛盾必反覆窮詰若付之扵吏聚干連人扵一處而泛然問之則隨是隨非衆口一律不至誤入必至誤出矣勿訊腿杖訊杖在法許於臀腿足底分受然每訊不過三十而止今人動輙訊至數百盖腿與陰近訊多必釁作輙死亦嘗親覩一官司訊人腿杖過百即死者不可不為深戒獄吏擇老練人獄吏若以惡少年為之則不識三尺考掠苦楚必求厭所欲而後止甚至終夜酷絣囚扵匣至死而獄吏醉卧不知者又有白日絣囚至重旁無人守已死而獄吏始知者彼何所顧藉得罪則在長官耳故凡獄吏須擇老成更練者為之有合鞫訊勒主吏持鞫囚歴取押然後入獄非時苦楚切須嚴禁不測入獄獄官不常詣獄非惟獄吏自恣将無辜人苦楚且出外酣飲傳寄消息或聚衆吏在獄博戲往來如逆旅甚至重囚竄逸而不知須不測詣獄索牌㸃視庶有忌憚病囚責出獄官夜㸃獄時或聞有呻吟之聲必須翌旦亟命醫胗視果病非大辟強盗並權出之令保人若親屬同視醫治或無保若親屬須責承監人安之旅舍然旅舍多令卧扵地飲食不時病勢寖加必責其令寝於床選良醫醫治日以加减聞仍責主案吏時時檢視飲食或至不可捄在我無愧而人亦無詞矣病囚責詞獄吏受賕或詐申囚病脱出至實有病不得賂反不即申或死扵獄事屬不明須嚴戒有病即申輕罪即出之或病稍重即委他官責詞内有以無病詐申者須親檢察病囚别牢重囚有病須别牢選醫醫治仍追其家屬㸔待或有患瘡者亦須别牢時其濯洗毋使與餘囚相近盖囚者同匣而卧朝夕薫蒸必至傳染檢察囚食囚之二饍送扵獄門係司門者傳入往往所求不滿意輙故為留滯致令飲食不時飢餓成疾須專責獄典檢察不測親問内有無供送而官給之糧者獄吏早晚例以飲食當㕔呈報而後給然所呈皆文具其實减尅所與無㡬當呈時須差人依様監給無使减尅徒為虛文遇旬㸃囚囚在獄日乆考掠苦楚饑餓病瘠置之暗室無由得見旬日必出扵獄庭之下一一㸃姓名且令繋扵獄之兩廊一則病瘠可見二則有不應禁者即釋之三則令獄吏潔其牢匣然後復入不為亡補獄壁必固獄吏得囚賂或夜縱其自便重囚無路竄脱或因飲水時積漸以水潠壁浸漬泥濕夜深則掲泥穴壁而出獄吏莫知者嘗有是事矣故重囚夜卧無令近壁兼四壁須令板夾仍堅其墻圍有壞即整鞫獄從實縲絏之下何求而不得若專尚威猛考掠苦楚勒其招伏彼不得己雖一時面從非惟異時翻異罪在失入况死者不可復生命誰與酬又有矯是弊者一切不加考掠專以輕罪誘其承伏愚民不識法苦扵乆繫意謂果輕亟欲出獄往往誣服其後却加以重罪則是以甘言誘人入扵死地也故鞫獄不可專用威猛亦不可誘以輕罪惟察詞觀色喻之以理扣其實情俾之自吐則善矣健訟者獨匣健訟之人在外則教唆詞訟在獄若與餘囚相近朝夕私語必令變亂情状以至翻異故健訟者須獨匣不可與餘囚相近二競人同牢二競俱禁若令别牢則獄吏受富強之賂公然傳状藁遞信息使之變亂情状不若俾競主與之同匣非惟互相譏察猶有忌憚且同匣日乆情或親宻解讎為和亦息訟之一端也審囚勿對吏主吏有勒囚招状者必戒其引問無翻異囚畏不如所戒必遭楚掠若對吏引問則囚必一切誣服不敢吐實故引問時須令主吏逺立仍和言喚囚近案反覆窮詰必得真情始可信矣昔胡文恭公通判宣州有死獄将抵罪公疑之呼囚以訊囚憚捶楚不敢言公引囚辟左右復訊方得其實非文恭之精誠鮮不誤矣夜親定獄縣令有憚其夜㸃獄者或分之佐官或委之典吏皆扵法不許若有過失罪将誰歸凡嚴寒盛暑須躬入逐牢用燭照視㸃姓名或用縲紲有輕重其手者亦可因而檢察勿輕禁人不應禁人勿禁若未欲訊决而權寄扵獄或係干證人日當引對者晚須出之盖法不應禁或有不測罪無所逃若婦人當刑禁者必先驗其有無孕恐或墮胎無以自明審記禁刑禁刑日或因事紛擾吏失檢舉或一時盛怒倉卒忘記或案吏結解慮所屬責稽慢先作檢舉立斷罪虛案置之案沓當立虛案時往往所用日印不照禁刑之日或被檢察罪不可逭故遇禁刑須大書于牌寘扵目前庶㡬目擊不至過誤革盗攤贓盗者平時與人有隙或受吏唆教類以寄贓誣平人平人憚其禁對不敢辯往往輙買贓賠償官司見所納如數意謂得其實不知悉非本物夫平人典質衣襦賠償以中盗賊復讎之姦計其屈己甚矣况吏得賂則俾認為真贓不得賂又以非元贓而追逮其苦豈可勝言哉必須親鞫得實然後追索罪重勿究輕諸鞫重罪大情已明者其餘輕罪並據招結欵追究載在令甲非不明白邇來州縣多不奉行切宜留意
