front:
  text: 欽定四庫全書史部十二
  hash: sha256:683b84fba18cbfaf1b4f7fb7adb0cf04b078729870de9e8d06bf823f11967f61
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2l0016_WYG_000-1a, image: WYG0602/WYG0602-0617a.png}
body:
  text: 州縣提綱職官類二官針之屬提要臣等謹案州縣提綱四卷不著撰人名氏楊士奇文淵閣書目題陳古靈撰古靈者宋陳襄别號也襄字述古候官人慶厯二年進士解褐授浦城尉官至右司郎中樞密直學士事迹具宋史本傳史稱其蒞官所至必講求民間利病殁後友人劉彞視其篋得手書數十幅皆言民事則此書似當出於襄然襄所著古靈集尚傳于世無一字及此書又所著易講義郊廟奉祀禮文校定夢書等見宋史藝文志福建通志説郛中不言更有此書朝陳二家書目亦皆不著録書內有紹興二十八年語又有昔吕惠卿昔劉公安世語考襄卒于元豐三年距南渡尚逺不應載及紹興且劉吕皆其後進不應稱昔其非襄撰明甚今永樂大典所載本蓋據元初所刻前有吳澄序止言前修所撰不著其名氏蓋澄亦疑而未定知文淵閣書目所題當出訛傳不足據矣其書論州縣蒞民之方極為詳備雖古今事勢未必盡同然于防姦釐弊之道抉摘最明而首卷推本正已省身凡數十事尤為知要亦可為司牧之指南雖不出于襄手要非究心吏事洞悉民情者不能作也乾隆四十六年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書州縣提綱目録卷一潔已平心専勤奉職循理節用養亷勿求虛譽防吏弄權同僚貴和防間子弟嚴內外之禁防私覿之欺戒親戚販鬻責吏須自反燕會宜簡吏言勿信時加警察晨起貴早事無積滯情勿壅蔽四不宜帶三不行刑俸給無妄請防市買之欺怒不可遷盛怒必忍疑事貴思勿聽私語勿差人索迓卷二判狀勿憑偏詞判狀勿多追人示無理者以法勿萌意科罰面審所供呈斷憑元供詳閲案牘詳審初詞通愚民之情交易不憑鈔誣告結反坐禁告訐擾農告訐必懲請佃勿遽結證會不足憑再會須點差聽訟無枝蔓立限量緩急立限量逺近催狀照前限柵不留人察監繫人里正副勿雜差用刑須可繼戒諭停保人執杖勿遽判緊限責病詞隨宜理債受狀不出箱判狀詳月日籍緊要事案牘用印無輕役民籍定工匠示不由吏詳畫地圗户口保伍修舉火政禁擾役人差役循例酌中差役禁差役之擾役須預差常平審給安養乞丐收撫遺棄月給雇金卷三捕到人勿訊革囚病之源疑似必察詳究初詞入獄親鞫事須隔問勿訊腿杖獄吏擇老練人不測入獄病囚責出病囚責詞病囚别牢檢察囚食遇旬點囚獄壁必固鞫獄從實健訟者獨匣二競人同牢審囚勿對吏夜親定獄勿輕禁人審記禁刑革盜攤贓罪重勿究輕卷四亷則財賦給畫月解圗整齊簿書關併詭户追稅先銷鈔揭籍點追稅收支無緩帑吏擇人搜求滲漏募役不禁催科省刑革催數欺弊户長拈號給册受納苖米勿頻退優自輸人户禁擅入倉當廳給鈔吳澄州縣提綱序天子以天下之人牧治之不能遍也於是命州縣之官分土而治其民其責任不亦重乎而近年多不擇人或貪黷或殘酷或愚暗或庸懦往往惟利己是圖豈有一毫利民之心哉嗚呼何辜斯民而使此輩魚肉之也吾鄉薑曼卿録事仕于閩忍貧自潔遇事必究底藴惻然惟恐傷於民前修所編州縣提綱一書手之不置蓋與其意無一不合故也章貢黎志逺復為鋟木以廣其傳嗚呼州縣親民之官人人能遵是書而行之民其庶幾乎曼卿之持身固謹而志逺之用心亦仁矣安得如此持身如此用心者布滿天下州縣哉
